name: C++/Qt CI

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Configure CMake
        run: cmake -B build -G "Unix Makefiles"

      - name: Build
        run: cmake --build build
